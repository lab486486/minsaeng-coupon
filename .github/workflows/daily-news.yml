name: Daily news watch

on:
  schedule:
    # 매일 00:00 UTC = 한국시간 09:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch Google News RSS
        run: node scripts/fetch-news.mjs

      - name: Commit digest
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news-watch.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No news changes"
          else
            git commit -m "chore: daily news watch digest"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Cloudflare secrets
        id: cf
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID 시크릿이 없어 Pages 배포를 건너뜁니다. GitHub → Settings → Secrets and variables → Actions 에 추가하세요."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.cf.outputs.ready == 'true'
        run: npm ci

      - name: Build
        if: steps.cf.outputs.ready == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: steps.cf.outputs.ready == 'true'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=minsaeng-coupon --branch=main

      - name: Report deploy result
        if: steps.cf.outputs.ready == 'true' && steps.deploy.outcome == 'failure'
        run: |
          echo "::warning::Cloudflare Pages 배포에 실패했습니다. GitHub Secrets의 CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID 값·권한(Account · Cloudflare Pages · Edit)을 확인하세요. 뉴스 수집·커밋은 완료된 상태입니다."
