name: Daily news watch

on:
  schedule:
    # 매일 00:00 UTC = 한국시간 09:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch Google News RSS
        run: node scripts/fetch-news.mjs

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news-watch.json
          if git diff --staged --quiet; then
            echo "No news changes"
          else
            git commit -m "chore: daily news watch digest"
            git push
            echo "Pushed digest — Deploy Cloudflare Pages workflow will publish"
          fi
